[Unit]
# Block k3s on the data-seed unit. If the seed unit fails (conflict
# mode -- /data/yolean has unmarked customer data) k3s does NOT
# start; the customer SSHes in, runs y-cluster-seed-status, applies
# the recommended recovery, then `systemctl start k3s.service`.
# See specs/y-cluster/APPLIANCE_UPGRADES.md.
Requires=y-cluster-data-seed.service
After=y-cluster-data-seed.service
