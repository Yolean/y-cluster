apiVersion: v1
kind: Secret
metadata:
  name: y-kustomize.blobs.setup-bucket-job
  namespace: default
  labels:
    yolean.se/module-part: y-kustomize
type: Opaque
stringData:
  base-for-annotations.yaml: |
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: setup-bucket-job
      annotations:
        y-kustomize/base: blobs/setup-bucket-job
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: setup
            image: busybox
            command: ["true"]
  values.yaml: |
    bucket: builds
