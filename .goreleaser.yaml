version: 2

project_name: y-cluster

before:
  hooks:
    - go mod tidy

builds:
  - id: kustomize-traverse
    main: .
    binary: kustomize-traverse
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: y-cluster
    main: ./cmd/y-cluster
    binary: y-cluster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: kustomize-traverse
    ids: [kustomize-traverse]
    name_template: "kustomize-traverse-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README*
      - SPEC*

  - id: y-cluster
    ids: [y-cluster]
    name_template: "y-cluster-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README*
      - SPEC*
      - SERVE_FEATURE*
      - src: pkg/serve/schema/y-cluster-serve.schema.json
        dst: schema

checksum:
  name_template: "checksums-sha256.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Yolean
    name: y-cluster
